name: Daily Shorts Automation

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: 
    inputs:
      custom_idea:
        description: 'Custom idea for the video (leave blank for fully automated)'
        required: false
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tzdata imagemagick ffmpeg nodejs fonts-dejavu
          # Completely remove ImageMagick restrictions so TextClip ALWAYS works
          sudo rm -f /etc/ImageMagick-6/policy.xml

      - name: Download Random Background Video from Dropbox
        run: |
          echo "Selecting a random video from the Dropbox pool..."
          
          LINKS=(
            "https://www.dropbox.com/scl/fi/gkc4ic16jzeba1qlym9pj/Subway-Surfers-Gameplay-No-Copyright-Vertical-OrbitalNCG-1080p-h264-youtube.mp4?rlkey=gnbc8wyv7mbt3jl20ott5se2a&st=cy2f0r1z&dl=1"
            "https://www.dropbox.com/scl/fi/vmnb2wlyyvsv5cqlhn1ml/Minecraft-Parkour-Gameplay-NO-COPYRIGHT-Vertical-Orbital-No-Copyright-Gameplay-1080p-h264-youtube.mp4?rlkey=5fzc7yhrkv1pzb67ixsjtgvw4&st=gslb8oi0&dl=1"
            "https://www.dropbox.com/scl/fi/m0gmnzczxmvh3jknhdn6p/GTA-5-Gameplay-No-Copyright-Mega-Ramp-Vertical-OrbitalNCG-1080p-h264-youtube.mp4?rlkey=twa4eyjcsddvjartfqj6h6m7q&st=bf2wojvn&dl=1"
          )
          
          SELECTED_LINK=${LINKS[$RANDOM % ${#LINKS[@]}]}
          echo "Downloading the selected video..."

          curl -L -o brainrot.mp4 "$SELECTED_LINK"
          

          FILESIZE=$(stat -c%s "brainrot.mp4")
          if [ $FILESIZE -lt 1000000 ]; then echo "❌ ERROR: Downloaded an HTML page instead of a video. Check your links!"; exit 1; fi

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Force moviepy 1.0.3 and Pillow 9.5.0 to prevent the ANTIALIAS crash
          pip install google-genai requests "moviepy==1.0.3" "Pillow==9.5.0" edge-tts google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Reconstruct Secure Credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: Run Master Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CUSTOM_IDEA: ${{ github.event.inputs.custom_idea }}
        run: python main.py