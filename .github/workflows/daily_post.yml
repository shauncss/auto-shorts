name: Daily Shorts Automation

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: 
    inputs:
      custom_idea:
        description: 'Custom idea for the video (leave blank for fully automated)'
        required: false
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tzdata imagemagick ffmpeg nodejs
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Download Master Background Video
        run: |
          echo "Downloading background footage from GitHub Releases..."
          # REPLACE THE LINK BELOW WITH YOUR COPIED GITHUB RELEASE LINK
          curl -L -o brainrot.mp4 "https://github.com/YourUsername/auto-shorts/releases/download/v1.0/your_video_name.mp4"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests moviepy edge-tts google-api-python-client google-auth-httplib2 google-auth-oauthlib 

      - name: Reconstruct Secure Credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: Run Master Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CUSTOM_IDEA: ${{ github.event.inputs.custom_idea }}
        run: python main.py