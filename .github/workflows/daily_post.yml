name: Daily Shorts Automation

on:
  schedule:
    # Runs at 12am, 6am, 12pm, and 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: 
    inputs:
      custom_idea:
        description: 'Custom idea for the video (leave blank for fully automated)'
        required: false
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests moviepy edge-tts google-api-python-client google-auth-httplib2 google-auth-oauthlib 
          pip install -U --pre yt-dlp

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests moviepy edge-tts google-api-python-client google-auth-httplib2 google-auth-oauthlib yt-dlp

      - name: Reconstruct Secure Credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: Run Master Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CUSTOM_IDEA: ${{ github.event.inputs.custom_idea }}
        run: python main.py